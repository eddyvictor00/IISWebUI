<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta id="initIISURL_java" th:data-value="${init_iisurl_java}">   
    <meta id="initIISURL_python" data-value="{{ init_iisurl_python }}">  
    <!-- Favicon -->
    <link href="aimain/img/favicon.ico" rel="icon">             
    <title>AII Stock App - Profile</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Load external JavaScript -->
    <script src="https://www.paypal.com/sdk/js?client-id=AeQXwgKYhKjAEQdawqFQDXYYRiEffGIJgMfgDnKeecf0zmk_XPC-Q4_ZUGTZ6LySeC85bDHIm-zgh_hs&currency=CAD&disable-funding=paylater"></script>     

    <script src="aimain/jsmain/iisweb.js"></script>         
    <script src="aimain/aisub/jssub/aiiindex_submenu.js"></script>         
    <script src="aimain/aiapp/js/aiapprofile.js"></script>
    <link href="aimain/aiapp/css/blink.css" rel="stylesheet">    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        html, body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1117;
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow-x: hidden; 
            height: 100vh; 
            width: 100vw;
            display: block;
        }

        #app-container {
            height: 100vh;
            width: 100%; 
            display: flex;
            flex-direction: column;
            background-color: #161b22; 
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.7);
        }

        #main-content {
            flex-grow: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: 4rem;
            background-color: #161b22; 

            &::-webkit-scrollbar { display: none; }
            -ms-overflow-style: none;  
            scrollbar-width: none;  
        }
        
        /* Custom Icons & Colors (UPDATED AS REQUESTED) */
        .nav-icon { font-size: 16px; }
        .text-green-500 { color: #34d399; } /* Applied by request */
        .text-red-500 { color: #f87171; }   /* Applied by request */
        .text-sky-400 { color: #38b2ac; }   /* Applied by request */

        /* Emoji Icons Applied by request */
        .icon-home::before { content: "🏠"; }
        .icon-positions::before { content: "📊"; }
        .icon-config::before { content: "⚙️"; }
        .icon-profile::before { content: "👤"; }
        
        /* Custom animation delay for logo */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .4; }
        }
        .animation-delay-300 { animation-delay: 300ms; }

        /* Custom disabled state styles */
        .btn-disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none; /* Crucial for preventing clicks */
        }
    </style>    
</head>
<body>
    <div id="app-container" class="mx-auto bg-gray-900 w-full sm:max-w-xl md:max-w-3xl lg:max-w-5xl h-screen flex flex-col">
        
        <header id="fixed-header" class="bg-gray-900 border-b border-gray-700 w-full p-3 flex justify-between items-center">
            <h1 class="text-xl font-bold text-white">Profile</h1>
            <button id="refresh-button" class="text-2xl text-sky-400 hover:text-sky-300 transition" aria-label="Refresh Data">
                <span class="refresh-icon">&#x21BB;</span>
            </button>
        </header>

        <div id="main-content" class="flex-grow overflow-y-auto">
            </div>
    </div>
    
    <div id="logout-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-75 hidden">
        <div class="bg-gray-800 rounded-xl p-6 w-80 border border-gray-700 shadow-2xl text-center">
            <h3 class="text-xl font-bold mb-4 text-white">Logout</h3>
            <p class="text-gray-400 mb-6">Are you sure you want to log out of your account?</p>
            <div class="flex space-x-3">
                <button id="cancel-logout-btn" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-semibold py-2 rounded-lg transition">
                    Cancel
                </button>
                <button id="confirm-logout-btn" class="flex-1 bg-red-600 hover:bg-red-700 text-white font-semibold py-2 rounded-lg transition">
                    Logout
                </button>
            </div>
        </div>
    </div>    
    <!-- Footer Navigation -->
    <nav id="nav-bar" class="fixed bottom-0 left-0 right-0 z-20 bg-gray-900 border-t border-gray-700 w-full sm:max-w-xl md:max-w-3xl lg:max-w-5xl mx-auto">
        <div class="flex justify-around items-center h-16 w-full">
            <button class="nav-item flex flex-col items-center justify-center p-2 transition text-gray-400" data-page="aiaphome">
                <span class="icon-home nav-icon"></span>
                <span class="text-xs mt-1">Home</span>
            </button>

            <button class="nav-item flex flex-col items-center justify-center p-2 transition text-gray-400" data-page="aiappositions">
                <span class="icon-positions nav-icon"></span>
                <span class="text-xs mt-1">Positions</span>
            </button>

            <button class="nav-item flex flex-col items-center justify-center p-2 transition text-gray-400" data-page="aiapconfig">
                <span class="icon-config nav-icon"></span>
                <span class="text-xs mt-1">Config</span>
            </button>

            <button class="nav-item flex flex-col items-center justify-center p-2 transition text-sky-400 border-t-2 border-sky-400" data-page="aiapprofile">
                <span class="icon-profile nav-icon"></span>
                <span class="text-xs mt-1">Profile</span>
            </button>
        </div>
    </nav>

    <div id="loading-spinner" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/60 backdrop-blur-[2px]">
        <div class="flex flex-col items-center justify-center h-full min-h-[100px] p-2">
            <div class="animate-spin rounded-full h-5 w-5 border-b-2 border-sky-400 mb-2"></div>
            <p class="text-gray-400 text-sm">Waiting for the data from the backend...</p>
        </div>
    </div>    
    <div id="activity-overlay" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
        <!-- ADDED: 'text-sm' to the main wrapper to reduce overall content text size -->
        <div class="bg-[#1c222d] border border-gray-700 rounded-2xl w-full max-w-md max-h-[85vh] flex flex-col overflow-hidden shadow-2xl text-sm">
            
            <div class="bg-[#252d3a] p-4 flex justify-between items-center border-b border-gray-700 flex-shrink-0">
                <div class="w-8"></div> 
                <!-- CHANGED: 'text-lg' to 'text-base' for a slightly smaller header -->
                <h3 class="text-base font-bold text-white">Activity Detail</h3>
                <button id="close-activity-btn" class="text-gray-400 hover:text-white text-2xl focus:outline-none">&times;</button>
            </div>
            
            <div id="activity-scroll-container" class="py-6 px-0 overflow-y-auto flex-grow" style="-ms-overflow-style: none; scrollbar-width: none;">
                <style>
                    #activity-scroll-container::-webkit-scrollbar { display: none; }
                </style>
                
                <div id="activity-detail-content"></div>
                
            </div>

        </div>
    </div>


</body>
</html>
