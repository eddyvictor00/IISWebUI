<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta id="initIISURL_java" th:data-value="${init_iisurl_java}">   
    <meta id="initIISURL_python" data-value="{{ init_iisurl_python }}">   
    <!-- Favicon -->
    <link href="aimain/img/favicon.ico" rel="icon">            
    <title>AII Stock App - Profile</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Load external JavaScript -->
    <script src="aimain/jsmain/iisweb.js"></script>         
    <script src="aimain/aiapp/js/aiaplogin.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        html, body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1117;
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow-x: hidden; 
            height: 100vh; 
            width: 100vw;
            display: block;
        }

        #app-container {
            height: 100vh;
            width: 100%; 
            display: flex;
            flex-direction: column;
            background-color: #161b22; 
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.7);
        }

        #main-content {
            flex-grow: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: 4rem;
            background-color: #161b22; 

            &::-webkit-scrollbar { display: none; }
            -ms-overflow-style: none;  
            scrollbar-width: none;  
        }
        
        /* Custom Icons & Colors (UPDATED AS REQUESTED) */
        .nav-icon { font-size: 16px; }
        .text-green-500 { color: #34d399; } /* Applied by request */
        .text-red-500 { color: #f87171; }   /* Applied by request */
        .text-sky-400 { color: #38b2ac; }   /* Applied by request */

        /* Emoji Icons Applied by request */
        .icon-home::before { content: "🏠"; }
        .icon-positions::before { content: "📊"; }
        .icon-config::before { content: "⚙️"; }
        .icon-profile::before { content: "👤"; }
        
        /* Custom animation delay for logo */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .4; }
        }
        .animation-delay-300 { animation-delay: 300ms; }

        /* Custom disabled state styles */
        .btn-disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none; /* Crucial for preventing clicks */
        }
    </style>    
</head>
<body>
    <div id="app-container" class="mx-auto bg-gray-900 w-full sm:max-w-xl md:max-w-3xl lg:max-w-5xl h-screen">
        <div id="main-content"></div>
    </div>
    
    <!-- Footer Navigation -->
    <nav id="nav-bar" class="fixed bottom-0 left-0 right-0 z-20 bg-gray-900 border-t border-gray-700 w-full sm:max-w-xl md:max-w-3xl lg:max-w-5xl mx-auto">
        <div class="flex justify-around items-center h-16 w-full">
            <button class="nav-item flex flex-col items-center justify-center p-2 transition text-gray-400" data-page="aiaphome">
                <span class="icon-home nav-icon"></span>
                <span class="text-xs mt-1">Home</span>
            </button>

            <button class="nav-item flex flex-col items-center justify-center p-2 transition text-gray-400" data-page="aiappositions">
                <span class="icon-positions nav-icon"></span>
                <span class="text-xs mt-1">Positions</span>
            </button>

            <button class="nav-item flex flex-col items-center justify-center p-2 transition text-gray-400" data-page="aiapconfig">
                <span class="icon-config nav-icon"></span>
                <span class="text-xs mt-1">Config</span>
            </button>

            <button class="nav-item flex flex-col items-center justify-center p-2 transition text-sky-400 border-t-2 border-sky-400" data-page="aiapprofile">
                <span class="icon-profile nav-icon"></span>
                <span class="text-xs mt-1">Profile</span>
            </button>
        </div>
    </nav>
</body>
</html>
