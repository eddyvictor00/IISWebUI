<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">  
    <!-- Favicon -->
    <link href="aimain/img/favicon.ico" rel="icon">           
    <title>AII Stock App - Stock Detail</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="aimain/jsmain/iisweb.js"></script>         
    <script src="aimain/aisub/jssub/aiiindex_submenu.js"></script>          
    <script src="aimain/aiapp/js/aiappositions_stock.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        html, body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1117;
            color: #ffffff;
            margin: 0;
            padding: 0;
            /* FIX: Remove height: 100vh and overflow-x: hidden to allow natural document flow */
            min-height: 100%;
            width: 100%;
            display: block;
            /* Allow standard touch gestures */
            touch-action: manipulation; 
        }

        #app-container {
            /* FIX: Change height from 100vh to auto so it grows with content */
            min-height: 100vh;
            width: 100%; 
            display: flex;
            flex-direction: column;
            background-color: #161b22; 
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.7);
        }

        #main-content {
            flex-grow: 1;
            /* FIX: Allow normal scrolling instead of hiding it */
            overflow-y: visible;
            background-color: #161b22; 
            padding-bottom: 5rem; 
        }
        /* Custom Icons (UPDATED as requested) */
        .nav-icon { font-size: 16px; }
        .text-green-500 { color: #34d399; }
        .text-red-500 { color: #f87171; }
        .text-sky-400 { color: #38b2ac; } /* Used for the segment color */

        .icon-home::before { content: "🏠"; }
        .icon-positions::before { content: "📊"; }
        .icon-config::before { content: "⚙️"; }
        .icon-profile::before { content: "👤"; }

        /* FIX: Remove the scrollbar-width: none and display: none rules 
        to allow users to see where they are while panning/zooming */
        #main-content::-webkit-scrollbar { 
            display: block; 
            width: 4px;
        }
        #main-content::-webkit-scrollbar-thumb {
            background: #374151;
        }

        /* Fix Nav Bar for Zoom: Use sticky or ensure it doesn't break layout */
        #nav-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 60;
            bg-gray-900;
            border-t: 1px solid #374151;
            /* Max width matches container */
            width: 100%;
            max-width: 1024px; /* lg:max-w-5xl */
        }
        .custom-spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #38b2ac; /* Matching your text-sky-400 color */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }        
    </style>    

</head>
<body>
    <div id="app-container" class="mx-auto bg-gray-900 w-full sm:max-w-xl md:max-w-3xl lg:max-w-5xl h-screen">
        
        <header class="py-2 px-4 flex items-center justify-between bg-gray-900 shadow-md flex-shrink-0">
            <div class="flex items-center">
                <button id="back-button" class="text-white text-xl mr-4" aria-label="Go Back">
                    &#8592; 
                </button>
                <h1 id="stock-symbol" class="text-xl font-semibold">AAPL</h1>
            </div>
            <!-- REFRESH BUTTON ADDED HERE -->
            <button id="refresh-button" class="text-2xl text-sky-400 hover:text-sky-300 transition" aria-label="Refresh Data">
                <span class="refresh-icon">&#x21BB;</span>
            </button>
        </header>


        <main id="main-content" class="flex-grow">

            <div class="py-4 px-0 bg-gray-800 rounded-lg mb-4 overflow-hidden">
                <div class="flex justify-between items-center mb-3 px-4">
                    <h3 class="text-sm font-semibold text-gray-400">Performance Chart</h3>
                    <div class="flex space-x-2">
                        <button id="btn-chart-3m" onclick="changeChartDuration(3)" class="chart-duration-btn px-3 py-1 text-xs rounded bg-sky-500 text-white transition font-medium">
                            3M
                        </button>
                        <button id="btn-chart-6m" onclick="changeChartDuration(6)" class="chart-duration-btn px-3 py-1 text-xs rounded bg-gray-700 text-gray-300 transition font-medium">
                            6M
                        </button>
                    </div>
                </div>
                
                <div class="relative min-h-[200px] bg-gray-900 border-y border-gray-700 overflow-hidden">
                    <div id="chart-loading-spinner" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-900 bg-opacity-70 z-10 hidden">
                        <div class="custom-spinner mb-2"></div>
                        <p class="text-xs text-sky-400 font-medium">Loading chart data...</p>
                    </div>

                    <img id="space3image" src="" onerror="reload3Image(this)" class="w-full block h-auto object-cover" alt="Stock Trend Chart Structure" />
                </div>
            </div>

            <div class="p-4">                       
                <div class="flex border-b border-gray-700 mb-4">
                    <button class="tab-button flex-1 text-center" data-tab="stock-detail">
                        Stock Detail
                    </button>
                    <button class="tab-button flex-1 text-center" data-tab="orders">
                        Analysis
                    </button>
                </div>
                <div id="stock-detail-content" class="tab-content active">
                </div>                         

                <div id="orders-content" class="tab-content hidden">   
                    <div id="fundamentalid" class="text-white p-4">Fundamental Analysis will appear here...</div>
                </div>
            </div>
        </main>
        
    </div>
    
    <nav id="nav-bar" class="fixed bottom-0 left-0 right-0 z-60 bg-gray-900 border-t border-gray-700 w-full sm:max-w-xl md:max-w-3xl lg:max-w-5xl mx-auto">
        <div class="flex justify-around items-center h-16 w-full">
            <button class="nav-item flex flex-col items-center justify-center p-2 transition text-gray-400" data-page="aiaphome">
                <span class="icon-home nav-icon"></span>
                <span class="text-xs mt-1">Home</span>
            </button>

            <button class="nav-item flex flex-col items-center justify-center p-2 transition text-sky-400 border-t-2 border-sky-400" data-page="aiappositions_stock">
                <span class="icon-positions nav-icon"></span>
                <span class="text-xs mt-1">Positions</span>
            </button>

            <button class="nav-item flex flex-col items-center justify-center p-2 transition text-gray-400" data-page="aiapconfig">
                <span class="icon-config nav-icon"></span>
                <span class="text-xs mt-1">Config</span>
            </button>

            <button class="nav-item flex flex-col items-center justify-center p-2 transition text-gray-400" data-page="aiapprofile">
                <span class="icon-profile nav-icon"></span>
                <span class="text-xs mt-1">Profile</span>
            </button>
        </div>
    </nav>
</body>
</html>
