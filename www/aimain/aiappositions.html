<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Favicon -->
    <link href="aimain/img/favicon.ico" rel="icon">         
    <title>AII Stock App - Positions</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="aimain/jsmain/iisweb.js"></script>         
    <script src="aimain/aisub/jssub/aiiindex_submenu.js"></script>           
    <script src="aimain/aiapp/js/aiappositions.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        html, body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1117;
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow-x: hidden; 
            height: 100vh; 
            width: 100vw;
            display: block;
        }

        #app-container {
            height: 100vh;
            width: 100%; 
            display: flex;
            flex-direction: column;
            background-color: #161b22; 
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.7);
        }

        /* Scrollbar hiding applied to main scrolling areas */
        #main-content, .trade-screen {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        #main-content::-webkit-scrollbar, .trade-screen::-webkit-scrollbar { 
            display: none; 
        }

        #main-content {
            flex-grow: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: 4rem; /* Space for the fixed nav bar */
            background-color: #161b22; 
            -webkit-overflow-scrolling: touch; 
        }
        
        /* Custom Icons (UPDATED as requested) */
        .nav-icon { font-size: 16px; }
        .text-green-500 { color: #34d399; }
        .text-red-500 { color: #f87171; }
        .text-sky-400 { color: #38b2ac; } /* Used for the segment color */

        .icon-home::before { content: "🏠"; }
        .icon-positions::before { content: "📊"; }
        .icon-config::before { content: "⚙️"; }
        .icon-profile::before { content: "👤"; }

        /* Overlay Styles for Add/Remove Screens */
        .trade-screen {
            position: fixed;
            top: 0;
            left: 50%; 
            transform: translateX(-50%); 
            
            /* Match the size of the app container on the screen */
            width: 100%;
            height: 100vh; 
            max-width: 50rem; /* Should match #app-container max-width */
            
            background-color: #0d1117; 
            z-index: 50; 
            display: none;
            flex-direction: column;
            overflow-y: auto; /* Enable scrolling for the content */
            -webkit-overflow-scrolling: touch; 
        }

        .trade-screen.active {
            display: flex;
        }

        /* Ensure nav bar stays on top */
        #nav-bar {
            z-index: 60;
        }

        /* Custom Styles for Input Focus/Appearance in trade screens */
        .trade-input {
            background-color: #1f2937; 
            border: 1px solid #374151; 
            transition: border-color 0.15s ease-in-out;
            color: #ffffff; /* Ensure text is white */
        }
        .trade-input:focus {
            border-color: #38bdf8; 
            outline: none;
            box-shadow: 0 0 0 1px #38bdf8;
        }
        
        /* This style is applied dynamically when the page content is loaded */
        .full-content-loaded {
            padding-bottom: 4rem;
        }
        
        /* Custom Spinner to match the uploaded image and now made smaller */
        .custom-spinner {
            width: 24px; /* Reduced size (e.g., from 56px) */
            height: 24px;
            border: 2px solid #374151; /* Reduced border thickness (e.g., from 4px) */
            border-top: 2px solid #38bdf8; /* Blue/Sky-400 for the active segment */
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        /* Using the existing Tailwind spin keyframes for consistency */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="app-container" class="mx-auto bg-gray-900 w-full sm:max-w-xl md:max-w-3xl lg:max-w-5xl h-screen">
        <!-- 
            Initial Full-Screen Spinner for immediate display. 
            Now using the custom spinner class.
        -->
        <div id="main-content" class="flex items-center justify-center h-full">
            <div class="flex flex-col items-center justify-center p-2">
                <!-- Custom Spinner (now very small) -->
                <div class="custom-spinner mb-1 animate-spin"></div>
                <!-- Reduced font size for the accompanying text -->
                <p class="text-gray-400 text-sm">Loading your data...</p>
            </div>
        </div>
        <!-- End Initial Spinner -->

                <div id="validate-add-stock-screen" class="trade-screen">
            <header class="p-4 flex items-center bg-gray-900 shadow-md flex-shrink-0">
                <button id="validate-add-back-button" class="text-white text-xl mr-4" aria-label="Go Back">
                    &#8592; 
                </button>
                <h1 class="text-xl font-semibold">Add New Position</h1>
            </header>

            <main class="p-5 flex-grow overflow-y-auto">
                <div class="text-center mb-6 p-4 bg-gray-900 rounded-lg shadow-inner">
                    <p class="text-sm text-gray-400 font-medium">Market Price</p>
                    <p class="text-3xl font-extrabold text-sky-400 mt-1"></p>
                </div>

                <div class="space-y-6 mb-6">
                    <div>
                        <label for="validate-add-symbol-input" class="block text-sm font-medium text-gray-400 mb-2">Stock Symbol (e.g., TSLA or RY.TO)</label>
                        <input type="text" id="validate-add-symbol-input" 
                               class="trade-input w-full p-3 rounded-lg text-lg font-semibold placeholder-gray-500 uppercase" 
                               placeholder="Enter ticker">
                    </div>
                    
                    <p id="validateaddStockBodyId" class="text-xs text-gray-500 mt-2 text-center"></p>
                </div>


                <button id="validate-add-stock-btn" 
                        class="w-full py-3 rounded-xl text-white font-bold text-lg transition duration-200 bg-sky-600 hover:bg-sky-700">
                    Validate Stock Symbol
                </button>
            </main>
        </div>

        <div id="add-stock-screen" class="trade-screen">
            <header class="p-4 flex items-center bg-gray-900 shadow-md flex-shrink-0">
                <button id="add-back-button" class="text-white text-xl mr-4" aria-label="Go Back">
                    &#8592; 
                </button>
                <h1 class="text-xl font-semibold">Add New Position</h1>
            </header>

            <main class="p-5 flex-grow overflow-y-auto">
                <div class="text-center mb-6 p-4 bg-gray-900 rounded-lg shadow-inner">
                    <p class="text-sm text-gray-400 font-medium">Market Price</p>
                    <p class="text-3xl font-extrabold text-sky-400 mt-1"></p>
                </div>

                <div class="space-y-6 mb-6">
                    <div>
                        <label for="add-symbol-input" class="block text-sm font-medium text-gray-400 mb-2">Stock Symbol (e.g., TSLA or RY.TO)</label>
                        <input type="text" id="add-symbol-input" 
                               class="trade-input w-full p-3 rounded-lg text-lg font-semibold placeholder-gray-500 uppercase" 
                               placeholder="" readonly>
                    </div>
                    
                    <div>
                        <label for="add-name-input" class="block text-sm font-medium text-gray-400 mb-2">Company Name</label>
                        <input type="text" id="add-name-input" 
                               class="trade-input w-full p-3 rounded-lg text-lg font-semibold placeholder-gray-500" 
                               placeholder="" readonly>
                    </div>
                    <div>
                        <label for="add-avg-price-input" class="block text-sm font-medium text-gray-400 mb-2">Current price</label>
                            <input type="text" id="add-price-input" 
                               class="trade-input w-full p-3 rounded-lg text-lg font-semibold placeholder-gray-500" 
                               placeholder="" readonly>                        
                    </div>

                    <p id="addStockBodyId" class="text-xs text-gray-500 mt-2 text-center"></p>
                </div>


                <button id="confirm-add-stock-btn" 
                        class="w-full py-3 rounded-xl text-white font-bold text-lg transition duration-200 bg-sky-600 hover:bg-sky-700">
                    Confirm Add Position
                </button>
            </main>
        </div>
        
        <div id="remove-stock-screen" class="trade-screen">
            <header class="p-4 flex items-center bg-gray-900 shadow-md flex-shrink-0">
                <button id="remove-back-button" class="text-white text-xl mr-4" aria-label="Go Back">
                    &#8592; 
                </button>
                <h1 class="text-xl font-semibold">Remove Position</h1>
            </header>

            <main class="p-5 flex-grow overflow-y-auto">
                <div class="text-center mb-6 p-4 bg-gray-900 rounded-lg shadow-inner">
                    <p class="text-sm text-gray-400 font-medium">Market Price</p>
                    <p class="text-3xl font-extrabold text-sky-400 mt-1"></p>
                </div>

                <div class="space-y-6 mb-6">
                    <div>
                        <label for="remove-symbol-select" class="block text-sm font-medium text-gray-400 mb-2">Select Stock Symbol from the list</label>
                        <select id="remove-symbol-select" 
                                class="trade-input w-full p-3 rounded-lg text-lg font-semibold text-white uppercase appearance-none bg-gray-700 cursor-pointer">
                            </select>
                    </div>
                    
                    <p id="removeStockBodyId" class="text-xs text-gray-500 mt-2 text-center"></p>                    
                </div>

                <button id="confirm-remove-stock-btn" disabled
                        class="w-full py-3 rounded-xl text-white font-bold text-lg transition duration-200 bg-gray-600 hover:bg-gray-700">
                    Confirm Remove Position
                </button>
            </main>
        </div>
        
    </div>
    
    <nav id="nav-bar" class="fixed bottom-0 left-0 right-0 z-60 bg-gray-900 border-t border-gray-700 w-full sm:max-w-xl md:max-w-3xl lg:max-w-5xl mx-auto">
        <div class="flex justify-around items-center h-16 w-full">
            <button class="nav-item flex flex-col items-center justify-center p-2 transition text-gray-400" data-page="aiaphome">
                <span class="icon-home nav-icon"></span>
                <span class="text-xs mt-1">Home</span>
            </button>

            <button class="nav-item flex flex-col items-center justify-center p-2 transition text-sky-400 border-t-2 border-sky-400" data-page="aiappositions">
                <span class="icon-positions nav-icon"></span>
                <span class="text-xs mt-1">Positions</span>
            </button>

            <button class="nav-item flex flex-col items-center justify-center p-2 transition text-gray-400" data-page="aiapconfig">
                <span class="icon-config nav-icon"></span>
                <span class="text-xs mt-1">Config</span>
            </button>

            <button class="nav-item flex flex-col items-center justify-center p-2 transition text-gray-400" data-page="aiapprofile">
                <span class="icon-profile nav-icon"></span>
                <span class="text-xs mt-1">Profile</span>
            </button>
        </div>
    </nav>
</body>
</html>
