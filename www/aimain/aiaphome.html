<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Favicon -->
    <link href="aimain/img/favicon.ico" rel="icon">         
    <title>AII Stock App - Home</title>
    <!-- Load Tailwind CSS --><script src="https://cdn.tailwindcss.com"></script>
    <!-- Load jQuery --><script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>     
    <script src="aimain/jsmain/iisweb.js"></script>         
    <script src="aimain/aisub/jssub/aiiindex_submenu.js"></script>              
    <script src="aimain/aiapp/js/aiaphome.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        html, body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1117;
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow-x: hidden; 
            height: 100vh; 
            width: 100vw;
            display: block;
        }

        #app-container {
            height: 100vh;
            width: 100%; 
            display: flex;
            flex-direction: column;
            background-color: #161b22; 
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.7);
        }

        #main-content {
            flex-grow: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: 4rem;
            background-color: #161b22; 

            &::-webkit-scrollbar { display: none; }
            -ms-overflow-style: none;  
            scrollbar-width: none;  
        }
        
        /* Custom Icons */
        .nav-icon { font-size: 16px; }
        .text-green-500 { color: #34d399; }
        .text-red-500 { color: #f87171; }
        .text-sky-400 { color: #38b2ac; }

        .icon-home::before { content: "🏠"; }
        .icon-positions::before { content: "📊"; }
        .icon-config::before { content: "⚙️"; }
        .icon-profile::before { content: "👤"; }

        .info-icon {
            display: inline-flex;
            width: 14px;
            height: 14px;
            border: 1px solid #718096;
            border-radius: 50%;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            line-height: 1;
            font-weight: normal;
            margin-left: 4px;
            vertical-align: middle;
            color: #718096;
        }

        .home-tab-button {
            padding: 8px 16px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: border-color 0.15s, color 0.15s;
        }

        .home-tab-button.active {
            color: #38b2ac;
            border-color: #38b2ac;
        }

        /* Custom animation for refresh button */
        .refresh-icon.animate-spin {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Full Page Loading Overlay (New) */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0d1117; /* Dark background */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100; /* Ensure it is above everything else */
            transition: opacity 0.3s ease-out;
            opacity: 1;
            pointer-events: all;
        }

        /* Overlay Spinner - MADE SMALLER */
        .overlay-spinner {
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top: 3px solid #38b2ac; /* Sky-400 color for spinner */
            border-radius: 50%;
            width: 24px; /* Reduced from 48px */
            height: 24px; /* Reduced from 48px */
            animation: spin 1s linear infinite;
        }

        .hidden-overlay {
            opacity: 0 !important;
            pointer-events: none !important;
        }
        /* Hides the scrollbar for the stock detail content area */
        #stock-detail-content::-webkit-scrollbar {
            display: none; /* Chrome, Safari, and Opera */
        }

        #stock-detail-content {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }        
    </style>
</head>
<body>
    <!-- Full Page Loading Overlay (Updated structure and text) -->
    <div id="loading-overlay">
        <div class="flex flex-col items-center justify-center">
            <div class="overlay-spinner mb-2"></div>
            <p class="text-base text-gray-300 font-medium">Loading your data...</p>
        </div>
    </div>
    
    <div id="app-container" class="mx-auto bg-gray-900 w-full sm:max-w-xl md:max-w-3xl lg:max-w-5xl h-screen">
        <div id="main-content"></div>
    </div>
    
    <nav id="nav-bar" class="fixed bottom-0 left-0 right-0 z-20 bg-gray-900 border-t border-gray-700 w-full sm:max-w-xl md:max-w-3xl lg:max-w-5xl mx-auto">
        <div class="flex justify-around items-center h-16 w-full">
            <button class="nav-item flex flex-col items-center justify-center p-2 transition text-sky-400 border-t-2 border-sky-400" data-page="aiaphome">
                <span class="icon-home nav-icon"></span>
                <span class="text-xs mt-1">Home</span>
            </button>

            <button class="nav-item flex flex-col items-center justify-center p-2 transition text-gray-400" data-page="aiappositions">
                <span class="icon-positions nav-icon"></span>
                <span class="text-xs mt-1">Positions</span>
            </button>

            <button class="nav-item flex flex-col items-center justify-center p-2 transition text-gray-400" data-page="aiapconfig">
                <span class="icon-config nav-icon"></span>
                <span class="text-xs mt-1">Config</span>
            </button>

            <button class="nav-item flex flex-col items-center justify-center p-2 transition text-gray-400" data-page="aiapprofile">
                <span class="icon-profile nav-icon"></span>
                <span class="text-xs mt-1">Profile</span>
            </button>
        </div>
    </nav>
</body>
</html>
